name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@f49d301c653f9aa0d99bec7b7f18f2d789e93fa7 # v0.43.4
    with:
      image: 'ghcr.io/radiorabe/supersaasauthconnector'
      name: 'supersaasauthconnector'
      display-name: 'SuperSaaS Auth Connector'
      tags: 'minimal rhel9 rabe s2i python supersaas oidc'
  release-mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@f49d301c653f9aa0d99bec7b7f18f2d789e93fa7 # v0.43.4
