name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@3f1ee42ffa54794a512d3989c34e3b4514de64cc # v0.43.1
    with:
      image: 'ghcr.io/radiorabe/supersaasauthconnector'
      name: 'supersaasauthconnector'
      display-name: 'SuperSaaS Auth Connector'
      tags: 'minimal rhel9 rabe s2i python supersaas oidc'
  release-mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@3f1ee42ffa54794a512d3989c34e3b4514de64cc # v0.43.1
