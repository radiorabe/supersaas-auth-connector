name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@479996126a091287dc3fd349786f6f8a6dd1b23c # v0.42.0
    with:
      image: 'ghcr.io/radiorabe/supersaasauthconnector'
      name: 'supersaasauthconnector'
      display-name: 'SuperSaaS Auth Connector'
      tags: 'minimal rhel9 rabe s2i python supersaas oidc'
  release-mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@479996126a091287dc3fd349786f6f8a6dd1b23c # v0.42.0
