name: Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@c7aef9928f610ec51b44f84debf2321189276d54 # v0.41.3
    with:
      image: 'ghcr.io/radiorabe/supersaasauthconnector'
      name: 'supersaasauthconnector'
      display-name: 'SuperSaaS Auth Connector'
      tags: 'minimal rhel9 rabe s2i python supersaas oidc'
  release-mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@c7aef9928f610ec51b44f84debf2321189276d54 # v0.41.3
