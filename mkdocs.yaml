site_name: SuperSaaS Auth Connector
repo_url: https://github.com/radiorabe/supersaas-auth-connector
repo_name: radiorabe/supersaas-auth-connector

theme:
  name: "material"
  custom_dir: docs/overrides
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      primary: '#00c9bf'
      accent: '#00c9bf'
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      primary: '#00c9bf'
      accent: '#00c9bf'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/radio
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

markdown_extensions:
- admonition
- attr_list
- md_in_html
- toc:
    permalink: true
- pymdownx.details
- pymdownx.emoji:
    emoji_index: !!python/name:material.extensions.emoji.twemoji
    emoji_generator: !!python/name:material.extensions.emoji.to_svg
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences

extra_css:
- css/style.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/radiorabe/supersaas-auth-connector
      name: GitHub
  generator: false

plugins:
- search
- section-index
- autorefs
- mkdocstrings:
    handlers:
      python:
        options:
          show_source: true
          show_root_heading: true
- llmstxt:
    markdown_description: |
      SuperSaaS Auth Connector bridges Keycloak OIDC authentication with SuperSaaS user
      management. It is a small Starlette application delivered as a container image.
      When a user authenticates via Keycloak, the connector creates a corresponding
      user account in SuperSaaS (if it does not already exist) and then forwards the
      user directly into SuperSaaS via the SuperSaaS login API.
    sections:
      Guide:
        - getting-started.md
        - configuration.md
        - architecture.md
      Development:
        - development.md
        - contributing.md
      Reference:
        - reference/index.md

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Development: development.md
  - Contributing: contributing.md
  - API Reference:
    - reference/index.md
